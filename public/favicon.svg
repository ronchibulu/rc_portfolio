<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
    <rect width="16" height="16" fill="#09090b" />
    <g fill="#c084fc">
        <!-- R: left column -->
        <rect x="2" y="4" width="1" height="7" />
        <!-- R: top bar -->
        <rect x="3" y="4" width="3" height="1" />
        <!-- R: top-right side -->
        <rect x="6" y="5" width="1" height="2" />
        <!-- R: middle bar -->
        <rect x="3" y="7" width="3" height="1" />
        <!-- R: diagonal leg -->
        <rect x="4" y="8" width="1" height="1" />
        <rect x="5" y="9" width="1" height="1" />
        <rect x="6" y="10" width="1" height="1" />
        <!-- C: left column -->
        <rect x="9" y="5" width="1" height="5" />
        <!-- C: top bar -->
        <rect x="10" y="4" width="3" height="1" />
        <!-- C: bottom bar -->
        <rect x="10" y="10" width="3" height="1" />
        <!-- C: rounded corner pixels -->
        <rect x="13" y="5" width="1" height="1" />
        <rect x="13" y="9" width="1" height="1" />
    </g>
</svg>
